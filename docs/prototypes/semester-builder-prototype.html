  html, body { margin: 0; padding: 0; height: 100%; background: #F7F5F2; }

  <!-- s0 — DETAILS                                                          -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <template id="s0"><style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Wine brand */
    --primary-50:#FDF2F1; --primary-100:#F2E7E4; --primary-200:#E6D5D1;
    --primary-600:#8E2A23; --primary-700:#7B1F1A; --primary-800:#5C1713;

    /* Warm neutrals */
    --text:#201D18; --text-muted:#736D65; --text-faint:#9E9890;
    --border:#DDD9D2; --border-sub:#EDE9E4; --surface-sub:#EDE9E4;
    --page-bg:#F7F5F2; --surface:#FFFFFF;

    /* Rail */
    --rail-bg:#160C0A; --rail-border:#221410; --rail-text:#B8A8A4; --rail-active:#8E2A23;

    --focus-ring:rgba(142,42,35,0.12);
    --shadow-card:0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-elevated:0 4px 12px rgba(0,0,0,0.08);

    /* Spacing scale — 4px base */
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
    --space-5:24px; --space-6:32px; --space-7:48px; --space-8:64px;

    /* Density */
    --cell-comfortable:12px 16px;
    --cell-compact:8px 12px;

    --font:'Plus Jakarta Sans', system-ui, sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--text);
    background: var(--page-bg);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ─────────── Left rail ─────────── */
  .rail {
    width: 268px; flex-shrink: 0;
    background: var(--rail-bg);
    border-right: 1px solid var(--rail-border);
    display: flex; flex-direction: column;
    padding: var(--space-5) 0;
  }
  .rail-brand {
    padding: 0 var(--space-5) var(--space-5);
    margin-bottom: var(--space-4);
    border-bottom: 1px solid var(--rail-border);
  }
  .rail-brand-name {
    color: #fff; font-weight: 500; font-size: 13px; letter-spacing: 0.18em;
  }
  .rail-brand-sub { color: #6A5A57; font-size: 11px; margin-top: 2px; letter-spacing: 0.02em; }

  .rail-steps { display: flex; flex-direction: column; gap: 2px; padding: 0 var(--space-3); flex: 1; }
  .step {
    display: flex; align-items: center; gap: var(--space-3);
    padding: 9px 12px; border-radius: 8px;
    color: var(--rail-text); cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .step:hover { background: rgba(255,255,255,0.04); }
  .step.active { background: rgba(142,42,35,0.16); }
  .step-num {
    width: 24px; height: 24px; flex-shrink: 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    background: rgba(255,255,255,0.06); color: var(--rail-text);
    border: 1px solid var(--rail-border);
  }
  .step.active .step-num { background: var(--rail-active); color: #fff; border-color: var(--rail-active); }
  .step.done .step-num { background: rgba(125,206,194,0.16); color: #7DCEC2; border-color: transparent; }
  .step-label { font-size: 14px; font-weight: 400; }
  .step.active .step-label { color: #fff; font-weight: 500; }

  /* user — no avatar, plain text per standing rule */
  .rail-user { padding: var(--space-4) var(--space-5) 0; margin-top: var(--space-4); border-top: 1px solid var(--rail-border); }
  .rail-user-name { color: #E7DEDB; font-size: 13px; font-weight: 500; }
  .rail-user-role { color: #6A5A57; font-size: 11px; }

  /* ─────────── Content column ─────────── */
  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    height: 56px; flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 0 var(--space-5);
  }
  .topbar-left { justify-self: start; }
  .topbar-center { justify-self: center; display: flex; align-items: center; gap: var(--space-3); }
  .topbar-right { justify-self: end; display: flex; align-items: center; gap: var(--space-4); }
  .crumb { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; }
  .crumb:hover { color: var(--text); }
  .sem-name { font-size: 15px; font-weight: 600; color: var(--text); }

  .save-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .save-status .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(125,206,194,0.22); color: #0A5A50; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 500; line-height: 1.3;
  }
  .badge.draft { background: rgba(158,196,180,0.18); color: #20503A; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; white-space: nowrap; transition: all 0.12s;
  }
  .btn-primary { background: var(--primary-600); color: #fff; }
  .btn-primary:hover { background: var(--primary-700); }
  .btn-outline { background: transparent; color: var(--primary-600); border: 1px solid var(--primary-600); }
  .btn-outline:hover { background: var(--primary-50); }
  .btn-sm { font-size: 13px; padding: 6px 13px; }

  /* scroll body */
  .scroll { flex: 1; overflow-y: auto; }
  .canvas { max-width: 760px; margin: 0 auto; padding: var(--space-7) var(--space-6) var(--space-8); }

  /* standardized step header — now on EVERY step incl. emails */
  .step-header { margin-bottom: var(--space-6); }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); }
  .step-title { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin-top: var(--space-2); }
  .step-desc { color: var(--text-muted); font-size: 14px; margin-top: var(--space-1); }

  /* single grouped card (was 4 separate cards) */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: var(--shadow-card); overflow: hidden;
  }
  .group { padding: var(--space-5) var(--space-5); }
  .group + .group { border-top: 1px solid var(--border-sub); }
  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-bottom: var(--space-4); }

  .field { margin-bottom: var(--space-5); }
  .field:last-child { margin-bottom: 0; }
  .field-label { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 4px; }
  .req { color: var(--primary-600); }
  .field-help { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

  .input {
    width: 100%; margin-top: var(--space-2);
    padding: 9px 12px; border-radius: 8px;
    font-family: var(--font); font-size: 14px;
    background: var(--surface-sub); border: 1px solid transparent; color: var(--text);
    outline: none; transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
  }
  .input::placeholder { color: var(--text-faint); }
  .input:hover { background: #E4E0DB; }
  .input:focus { background: var(--surface); border-color: var(--primary-600); box-shadow: 0 0 0 3px var(--focus-ring); }

  .threshold-row { display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-2); }
  .input-num { width: 96px; }
  .segmented { display: inline-flex; background: var(--surface-sub); border-radius: 8px; padding: 3px; gap: 2px; }
  .seg { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.12s; }
  .seg.active { background: var(--primary-600); color: #fff; }

  /* inline toggle row */
  .toggle-row { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-5); }
  .toggle-row .copy { flex: 1; }
  .switch { width: 40px; height: 23px; border-radius: 999px; background: #CFC9C1; position: relative; cursor: pointer; flex-shrink: 0; margin-top: 2px; transition: background 0.15s; }
  .switch::after { content:''; position: absolute; top: 2px; left: 2px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: left 0.15s; }
  .switch.on { background: var(--primary-600); }
  .switch.on::after { left: 19px; }

  /* footer — nav only; redundant "Step x of y" label removed */
  .footer {
    height: 64px; flex-shrink: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 var(--space-6); gap: var(--space-3);
  }

  :focus-visible { outline: 2px solid var(--primary-600); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

  <div class="app">

    <!-- ── Rail: 8 steps, Emails merged in at 7 ── -->
    <nav class="rail">
      <div class="rail-brand">
        <div class="rail-brand-name">AYDT ADMIN</div>
        <div class="rail-brand-sub">Semester builder</div>
      </div>
      <div class="rail-steps">
        <div class="step active"><span class="step-num">1</span><span class="step-label">Details</span></div>
        <div class="step"><span class="step-num">2</span><span class="step-label">Classes &amp; offerings</span></div>
        <div class="step"><span class="step-num">3</span><span class="step-label">Class groups</span></div>
        <div class="step"><span class="step-num">4</span><span class="step-label">Payment</span></div>
        <div class="step"><span class="step-num">5</span><span class="step-label">Discounts</span></div>
        <div class="step"><span class="step-num">6</span><span class="step-label">Registration form</span></div>
        <div class="step"><span class="step-num">7</span><span class="step-label">Emails</span></div>
        <div class="step"><span class="step-num">8</span><span class="step-label">Review &amp; publish</span></div>
      </div>
      <div class="rail-user">
        <div class="rail-user-name">Nicole V.</div>
        <div class="rail-user-role">Super Admin</div>
      </div>
    </nav>

    <!-- ── Content ── -->
    <div class="content">

      <div class="topbar">
        <div class="topbar-left">
          <span class="crumb">‹ Semesters</span>
        </div>
        <div class="topbar-center">
          <span class="sem-name">UES — Spring Season 2026</span>
          <span class="badge draft">Draft</span>
        </div>
        <div class="topbar-right">
          <span class="save-status"><span class="dot">✓</span> Saved · just now</span>
          <button class="btn btn-outline btn-sm">Preview</button>
        </div>
      </div>

      <div class="scroll">
        <div class="canvas">

          <div class="step-header">
            <div class="eyebrow">Step 1 of 8</div>
            <h1 class="step-title">Semester details</h1>
            <p class="step-desc">Configure the basic settings for this semester.</p>
          </div>

          <!-- ONE grouped card replaces the four stacked cards -->
          <div class="card">

            <div class="group">
              <div class="group-label">Basics</div>

              <div class="field">
                <label class="field-label">Semester name <span class="req">*</span></label>
                <input class="input" value="UES — Spring Season 2026">
                <div class="field-help">Shown to families in the registration portal.</div>
              </div>

              <div class="field">
                <label class="field-label">Location <span class="req">*</span></label>
                <input class="input" placeholder="e.g. Upper East Side">
                <div class="field-help">Campus for this semester. All classes belong to this location — keeps UES and Washington Heights programs separate.</div>
              </div>
            </div>

            <div class="group">
              <div class="group-label">Enrollment display</div>

              <div class="field">
                <label class="field-label">Availability warning threshold</label>
                <div class="threshold-row">
                  <input class="input input-num" value="90">
                  <div class="segmented">
                    <span class="seg active">Spots remaining</span>
                    <span class="seg">% full</span>
                  </div>
                </div>
                <div class="field-help">When a class hits this many spots left, families see “X spots left” on the enrollment card. Leave blank to hide availability counts.</div>
              </div>

              <div class="field toggle-row">
                <div class="copy">
                  <label class="field-label">Track attendance</label>
                  <div class="field-help">Record attendance per session for reporting and compliance.</div>
                </div>
                <div class="switch" onclick="this.classList.toggle('on')" role="switch" tabindex="0"></div>
              </div>
            </div>

          </div>

        </div>
      </div>

      <div class="footer">
        <button class="btn btn-primary">Next: Classes &amp; offerings →</button>
      </div>

    </div>
  </div>
</template>

  <!-- s1 — CLASSES & OFFERINGS                                              -->

  <template id="s1"><style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary-50:#FDF2F1; --primary-100:#F2E7E4; --primary-200:#E6D5D1;
    --primary-600:#8E2A23; --primary-700:#7B1F1A; --primary-800:#5C1713;

  }
  html, body { height: 100%; }

  /* Rail */

  .step { display: flex; align-items: center; gap: var(--space-3); padding: 9px 12px; border-radius: 8px; color: var(--rail-text); cursor: pointer; transition: background 0.12s; }
  .step:hover { background: rgba(255,255,255,0.04); }
  .step.active { background: rgba(142,42,35,0.16); }
  .step-num { width: 24px; height: 24px; flex-shrink: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; background: rgba(255,255,255,0.06); color: var(--rail-text); border: 1px solid var(--rail-border); }

<script>
  const rows = [...document.querySelectorAll('#tbody tr')];
  // build the list column from the same data
  const listColumn = document.getElementById('listColumn');
  rows.forEach(tr => {
    const name = tr.dataset.name;
    const chip = tr.querySelector('.chip').cloneNode(true);
    const division = tr.children[1].textContent;
    const day = tr.querySelector('.sched-day').textContent;
    const time = tr.querySelector('.sched-time').textContent;
    const el = document.createElement('div');
    el.className = 'class-row';
    el.dataset.name = name;
    el.innerHTML = `<div class="class-row-top"><span class="class-name">${name}</span></div><div class="class-meta">${division} · ${day} · ${time}</div>`;
    el.querySelector('.class-row-top').appendChild(chip);
    el.addEventListener('click', () => selectClass(name));
    listColumn.appendChild(el);
  });

  function openEditor(name){
    document.getElementById('browseView').classList.add('hidden');
    document.getElementById('editView').classList.remove('hidden');
    selectClass(name);
  }
  function closeEditor(){
    document.getElementById('editView').classList.add('hidden');
    document.getElementById('browseView').classList.remove('hidden');
  }
  function selectClass(name){
    document.getElementById('editorTitle').textContent = name;
    document.getElementById('editorName').value = name;
    document.querySelectorAll('#listColumn .class-row').forEach(r => r.classList.toggle('selected', r.dataset.name === name));
  }
  rows.forEach(tr => tr.addEventListener('click', () => openEditor(tr.dataset.name)));

  function toggleReg(el){
    el.classList.toggle('on');
    const tiered = document.querySelector('[data-reg=tiered]').classList.contains('on');
    const dropin = document.querySelector('[data-reg=dropin]').classList.contains('on');
    let html;
    if (!tiered && !dropin) html = '<strong>Standard</strong> — one price, full-term enrollment, families attend all sessions.';
    else if (tiered && !dropin) html = '<strong>Tiered</strong> — families choose a pricing tier at checkout (e.g. full vs half day).';
    else if (!tiered && dropin) html = '<strong>Drop-in</strong> — families book individual sessions and pay per session.';
    else html = '<strong>Tiered drop-in</strong> — families pick individual sessions and a tier per booking.';
    document.getElementById('regDesc').innerHTML = html;
  }
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); }));
  document.addEventListener('click', e => { if(!e.target.closest('.add-wrap')) document.getElementById('addMenu').classList.remove('open'); });
</script>

<script>
  const groups = ['Ballet','Hip Hop','Tap','Contemporary','Broadway','Technique'];
  const disciplineToGroup = { Ballet:'Ballet', Tap:'Tap', 'Hip Hop':'Hip Hop', Contemporary:'Contemporary', Broadway:'Broadway' };
  const chipClass = { Ballet:'ballet', Tap:'tap', 'Hip Hop':'hiphop', Contemporary:'contemporary', Broadway:'broadway', Technique:'technique' };
  const classes = [
    {name:'Ballet 1A', disc:'Ballet', sessions:83, group:''},
    {name:'Tap Intro', disc:'Tap', sessions:21, group:''},
    {name:'Hip Hop Intro', disc:'Hip Hop', sessions:63, group:''},
    {name:'Tap 1B', disc:'Tap', sessions:63, group:''},
    {name:'Pre-Ballet 2', disc:'Ballet', sessions:83, group:''},
    {name:'Contemporary 2', disc:'Contemporary', sessions:42, group:''},
    {name:'Ballet 1B', disc:'Ballet', sessions:83, group:''},
    {name:'Open Level Broadway 1', disc:'Broadway', sessions:42, group:''},
    {name:'Graded Ballet 5', disc:'Ballet', sessions:42, group:''},
    {name:'Tap 2', disc:'Tap', sessions:84, group:''},
    {name:'Broadway 2', disc:'Broadway', sessions:83, group:''},
    {name:'Open Level Ballet 5', disc:'Ballet', sessions:62, group:''},
  ];
  const selected = new Set();

  function renderTable(){
    const tb = document.getElementById('atbody');
    tb.innerHTML = '';
    classes.forEach((c, i) => {
      const tr = document.createElement('tr');
      const opts = ['<option value="">Unassigned</option>'].concat(groups.map(g => `<option ${c.group===g?'selected':''}>${g}</option>`)).join('');
      tr.innerHTML = `
        <td><input type="checkbox" class="cb" data-i="${i}" ${selected.has(i)?'checked':''}></td>
        <td><div class="cell-class"><span class="cn">${c.name}</span><span class="chip ${chipClass[c.disc]}">${c.disc}</span></div></td>
        <td class="right sess-count">${c.sessions}</td>
        <td><select class="gselect ${c.group?'assigned':''}" data-i="${i}">${opts}</select></td>`;
      tb.appendChild(tr);
    });
    tb.querySelectorAll('.cb').forEach(cb => cb.addEventListener('change', e => {
      const i = +e.target.dataset.i;
      e.target.checked ? selected.add(i) : selected.delete(i);
      renderBulk();
    }));
    tb.querySelectorAll('.gselect').forEach(s => s.addEventListener('change', e => {
      classes[+e.target.dataset.i].group = e.target.value;
      renderAll();
    }));
  }

  function renderGroups(){
    const list = document.getElementById('groupsList');
    list.innerHTML = '';
    groups.forEach(g => {
      const members = classes.filter(c => c.group === g);
      const sess = members.reduce((a,c)=>a+c.sessions,0);
      const card = document.createElement('div');
      card.className = 'gcard' + (members.length ? ' has' : '');
      card.innerHTML = `
        <div class="gcard-top">
          <div class="gcard-left"><span class="drag-handle" title="Drag to reorder">⠿</span><span class="gcard-name">${g}</span></div>
          <div style="display:flex;gap:12px;align-items:center">
            <span class="gcard-count">${members.length} ${members.length===1?'class':'classes'} · ${sess} sessions</span>
            <span class="gcard-del">Delete</span>
          </div>
        </div>
        ${members.length
          ? `<div class="gcard-chips">${members.map(c=>`<span class="gchip">${c.name}</span>`).join('')}</div>`
          : `<div class="gcard-empty">No classes — assign from the table.</div>`}`;
      list.appendChild(card);
    });
  }

  function renderBulk(){
    const bar = document.getElementById('bulkbar');
    bar.classList.toggle('show', selected.size > 0);
    document.getElementById('bsel').textContent = `${selected.size} selected`;
  }

  function renderNote(){
    const total = classes.reduce((a,c)=>a+c.sessions,0);
    const grouped = classes.filter(c=>c.group).reduce((a,c)=>a+c.sessions,0);
    const ungrouped = total - grouped;
    document.getElementById('ungroupedNote').innerHTML = `<b>${ungrouped}</b> of ${total} sessions ungrouped — available for standalone booking.`;
  }

  function renderAll(){ renderTable(); renderGroups(); renderBulk(); renderNote(); }

  function autoGroup(){
    classes.forEach(c => { if (disciplineToGroup[c.disc]) c.group = disciplineToGroup[c.disc]; });
    renderAll();
  }
  function bulkAssign(g){
    if (!g) return;
    selected.forEach(i => classes[i].group = g);
    selected.clear();
    document.getElementById('bulkSelect').value = '';
    renderAll();
  }
  function clearSel(){ selected.clear(); renderAll(); }
  function createGroup(){
    const name = document.getElementById('newGroupName').value.trim();
    if (name && !groups.includes(name)) { groups.push(name); document.getElementById('newGroupName').value=''; renderAll(); }
  }

  renderAll();
</script>

  function showTab(t){

  function pickPlan(el){ document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('sel')); el.classList.add('sel'); }
  function toggleUnused(bodyId, toggleId, noun){
    const body = document.getElementById(bodyId); const tog = document.getElementById(toggleId);
    const hidden = body.classList.toggle('hidden');
    const n = body.querySelectorAll('tr').length;
    tog.textContent = hidden ? `Show ${n} unused ${noun} ⌄` : `Hide unused ${noun} ⌃`;
  }
  function toggleAdd(id, btn){
    const f = document.getElementById(id); const open = !f.classList.toggle('hidden');
    btn.textContent = open ? btn.textContent.replace('+ Add','− Hide') : btn.textContent.replace('− Hide','+ Add');
  }

  // exempt classes
  const exemptClasses = ['Ballet 1A','Tap Intro','Hip Hop Intro','Tap 1B','Pre-Ballet 2','Contemporary 2','Ballet 1B','Open Level Broadway 1','Graded Ballet 5','Dance with Me, Session 2','Tap 2','Broadway 2','Open Level Ballet 5','Boys’ Hip Hop and Breakdancing 1/2','Open Level Intermediate Ballet','Intermediate Ballet A','Tap 3','Pre-Ballet 3','Hip Hop 2','Ballet 2','Open Level Tap','Hip Hop 4','Technique 2','Open Level Broadway 2','Hip Hop 3','Open Level Ballet 3','Intermediate Ballet B','Intermediate Tap','Broadway 3','Open Level Broadway 3','Boys’ Hip Hop and Breakdancing 3/4','Broadway 4','Technique 1','Pre-Ballet 1','Open Level Ballet 4','Contemporary 1','Broadway 1','First Steps, Session 1','Tap 1A','First Steps, Session 2','Open Level Hip Hop 5','Technique 3','Dance with Me, Session 1','Hip Hop 1','Advanced Tap','Pre-Pointe','Pointe','Competition Team Jr','Competition Team Sr','Adult Ballet','Adult Tap','Open Level Jazz','Musical Theater 1','Musical Theater 2'];
  const exemptSel = new Set();
  function renderExempt(filter=''){
    const list = document.getElementById('exemptList'); list.innerHTML = '';

      const el = document.createElement('span');

      el.textContent = c;
      el.onclick = () => { exemptSel.has(c) ? exemptSel.delete(c) : exemptSel.add(c); renderExempt(document.getElementById('exemptSearch').value); };

  renderExempt();
</script>

<script>
  const discounts = [
    { name:'Multi-class discount', type:'session', rule:'1 rule', dupes:0 },
    { name:'3+ Classes Enrollment Discount', type:'session', rule:'1 rule', dupes:9 },
    { name:'3-week discount', type:'session', rule:'1 rule', dupes:0 },
    { name:'Multi-Child Family Discount', type:'person', rule:'1 rule', dupes:2 },
  ];
  const linked = new Set();

  function typeLabel(t){ return t === 'session' ? 'Multi-session' : 'Multi-person'; }

  function render(){
    const avail = document.getElementById('availList');
    const linkedEl = document.getElementById('linkedList');
    avail.innerHTML = '';
    const linkedRows = [];
    discounts.forEach((d, i) => {
      const isLinked = linked.has(i);
      const row = document.createElement('div');
      row.className = 'drow' + (isLinked ? ' linked' : '');
      row.innerHTML = `
        <div class="drow-main">
          <span class="chev" onclick="toggleDetail(this)">›</span>
          <div class="switch ${isLinked?'on':''}" data-i="${i}" onclick="toggleLink(${i})"></div>
          <div>
            <div class="dname">${d.name}</div>
            <div class="dmeta">
              <span class="tchip ${d.type}">${typeLabel(d.type)}</span>
              <span class="drule">${d.rule}</span>
              ${d.dupes ? `<span class="dup-chip" title="Duplicate records">${d.dupes} copies</span>` : ''}
            </div>
          </div>
          <span class="dspacer"></span>
          <div class="ovf"><span class="ovf-btn" onclick="toggleOvf(this)">⋯</span><div class="ovf-menu"><div class="ovf-item">Edit rules</div>${d.dupes?'<div class="ovf-item">Merge duplicates</div>':''}<div class="ovf-item danger">Delete</div></div></div>
        </div>
        <div class="drow-detail"><div class="rule-box">Rule editor for <b>${d.name}</b> — thresholds and discount amount would be edited here.</div></div>`;
      if (isLinked) linkedRows.push(row); else avail.appendChild(row);
    });
    if (linkedRows.length) {
      linkedEl.className = 'dlist';
      linkedEl.innerHTML = '';
      linkedRows.forEach(r => linkedEl.appendChild(r));
    } else {
      linkedEl.className = 'dlist empty-hint';
      linkedEl.textContent = 'No discounts linked yet — toggle one below to apply it this semester.';
    }
    document.getElementById('linkedCnt').textContent = linked.size;
    document.getElementById('availCnt').textContent = discounts.length - linked.size;
  }
  function toggleLink(i){ linked.has(i) ? linked.delete(i) : linked.add(i); render(); }
  function toggleDetail(el){ el.classList.toggle('open'); el.closest('.drow').querySelector('.drow-detail').classList.toggle('open'); }
  function toggleOvf(el){
    const menu = el.nextElementSibling; const wasOpen = menu.classList.contains('open');
    document.querySelectorAll('.ovf-menu').forEach(m => m.classList.remove('open'));
    if (!wasOpen) menu.classList.add('open');
  }
  function showTab(t){
    document.querySelectorAll('.subtab').forEach(s => s.classList.toggle('active', s.dataset.t === t));
    document.getElementById('panel-discounts').classList.toggle('hidden', t !== 'discounts');
    document.getElementById('panel-coupons').classList.toggle('hidden', t !== 'coupons');
  }
  function openCouponModal(){ document.getElementById('couponModal').classList.add('open'); }
  function closeCouponModal(){ document.getElementById('couponModal').classList.remove('open'); }
  document.addEventListener('click', e => { if(!e.target.closest('.ovf')) document.querySelectorAll('.ovf-menu').forEach(m => m.classList.remove('open')); });
  // create-discount modal
  let discType = 'session';
  function openDiscountModal(){
    document.getElementById('discountModal').classList.add('open');
    if (!document.querySelector('#rulesList .rule')) addRule();
  }
  function closeDiscountModal(){ document.getElementById('discountModal').classList.remove('open'); }
  function ruleNoun(){ return discType === 'session' ? 'classes' : 'dancers in a family'; }
  function addRule(){
    const html = `<div class="rule">
        <span>When</span>
        <input class="minput min" value="3">
        <span>or more <span class="rule-noun">${ruleNoun()}</span> —</span>
        <input class="minput amt" value="15">
        <select class="rsel"><option>% off</option><option>$ off</option></select>
        <span class="rule-rm" onclick="this.closest('.rule').remove()">Remove</span>
      </div>`;
    document.getElementById('rulesList').insertAdjacentHTML('beforeend', html);
  }
  function setDiscType(t){
    discType = t;
    document.querySelectorAll('#discountModal .seg').forEach(s => s.classList.toggle('active', s.dataset.type === t));
    document.getElementById('typeDesc').textContent = t === 'session'
      ? 'Discount scales with how many classes a dancer is enrolled in.'
      : 'Discount scales with how many dancers a family enrolls.';
    document.querySelectorAll('#rulesList .rule-noun').forEach(n => n.textContent = ruleNoun());
  }

  render();
</script>
</template>

<script>
  // overflow menus
  function toggleOvf(el){ const m = el.nextElementSibling; const open = m.classList.contains('open'); document.querySelectorAll('.ovf-menu').forEach(x=>x.classList.remove('open')); if(!open) m.classList.add('open'); }
  document.addEventListener('click', e => {
    if(!e.target.closest('.ovf')) document.querySelectorAll('.ovf-menu').forEach(m=>m.classList.remove('open'));
    if(!e.target.closest('.add-wrap')) document.getElementById('addMenu').classList.remove('open');
  });
  // required badge toggle
  document.querySelectorAll('.req-badge').forEach(b => b.addEventListener('click', () => {
    const on = b.classList.toggle('on'); b.textContent = on ? 'Required' : 'Optional';
    b.closest('.frow').querySelector('.req-dot').classList.toggle('off', !on);
  }));
  // section collapse
  function toggleSection(chev){ chev.classList.toggle('collapsed'); chev.closest('.section').querySelector('.sec-fields').classList.toggle('collapsed'); }
  // modals
  function openModal(id){ document.getElementById('addMenu').classList.remove('open'); document.getElementById(id).classList.add('open'); }
  function closeModal(id){ document.getElementById(id).classList.remove('open'); }
  // locked preview
  function toggleLock(){ document.getElementById('lockSwitch').classList.toggle('on'); document.getElementById('builder').classList.toggle('locked'); document.querySelectorAll('.frow').forEach(r => r.draggable = !document.getElementById('builder').classList.contains('locked')); }

  // drag-and-drop reorder (within a section)
  let dragRow = null;
  document.querySelectorAll('.frow').forEach(row => {
    row.addEventListener('dragstart', e => { dragRow = row; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    row.addEventListener('dragend', () => { dragRow && dragRow.classList.remove('dragging'); document.querySelectorAll('.frow.over').forEach(r=>r.classList.remove('over')); dragRow = null; });
  });
  function onDragOver(e){
    e.preventDefault();
    const container = e.currentTarget;
    if(!dragRow || !container.contains(dragRow) === false){}
    const after = getAfter(container, e.clientY);
    document.querySelectorAll('.frow.over').forEach(r=>r.classList.remove('over'));
    if(dragRow && container.contains(dragRow)){
      if(after == null) container.appendChild(dragRow);
      else container.insertBefore(dragRow, after);
    }
  }
  function getAfter(container, y){
    const rows = [...container.querySelectorAll('.frow:not(.dragging)')];
    return rows.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height/2;
      if(offset < 0 && offset > closest.offset) return { offset, element: child };
      return closest;
    }, { offset: -Infinity }).element;
  }
</script>

  const subsByEmail = { conf: ['info','design'], wl: ['settings','info','design'] };
  const subLabel = { info: 'Template info', design: 'Design', settings: 'Settings' };
  const emailMeta = { conf: 'Sent automatically when a registration is confirmed.', wl: 'Sent when a waitlist spot opens up for a family.' };

  function selectEmail(e){ email = e; sub = (e === 'wl') ? 'settings' : 'info'; document.querySelectorAll('.seg').forEach(s => s.classList.toggle('active', s.dataset.e === e)); document.getElementById('emeta').textContent = emailMeta[e]; renderSubtabs(); apply(); }
  function selectSub(s){ sub = s; renderSubtabs(); apply(); }
  function renderSubtabs(){
    const bar = document.getElementById('subtabs'); bar.innerHTML = '';
    subsByEmail[email].forEach(s => {
      const el = document.createElement('div');
      el.className = 'subtab' + (s === sub ? ' active' : '');
      el.textContent = subLabel[s];
      el.onclick = () => selectSub(s);
      bar.appendChild(el);
    });
  }
  function apply(){
    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
    const id = `p-${email}-${sub}`;
    const panel = document.getElementById(id);
    if (panel) panel.classList.remove('hidden');
    // tokens + test-send only on email-content tabs (not Settings)
    const onContent = sub !== 'settings';
    document.getElementById('tokensWrap').style.visibility = onContent ? 'visible' : 'hidden';

  renderSubtabs(); apply();

<script>

    { id:'discounts', label:'Discounts' },
    { id:'regform', label:'Registration Form' },
    { id:'emails', label:'Emails' },
  ];
  let active = 'details';
  function renderTabs(){
    const bar = document.getElementById('rtabs'); bar.innerHTML = '';
    tabs.forEach(t => {
      const el = document.createElement('div');
      el.className = 'rtab' + (t.id === active ? ' active' : '');
      el.innerHTML = `<span class="chk">✓</span>${t.label}`;
      el.onclick = () => { active = t.id; renderTabs(); showPanel(); };
      bar.appendChild(el);
    });
  }
  function showPanel(){ tabs.forEach(t => document.getElementById('r-'+t.id).classList.toggle('hidden', t.id !== active)); }
  document.addEventListener('click', e => { if(!e.target.closest('.split')) document.getElementById('splitMenu').classList.remove('open'); });
  renderTabs(); showPanel();
</script>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- Orchestration — swaps templates into the iframe, wires rail + footer  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <script>
  const N = 8;
  const stage = document.getElementById('stage');
  const FONTS = '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">';
  let current = 0;
  function buildDoc(i) {
    const inner = document.getElementById('s' + i).innerHTML;
    return '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">' + FONTS + '</head><body>' + inner + '</body></html>';
  }
  function show(i) {
    if (i < 0 || i >= N) return;
    current = i;
    stage.srcdoc = buildDoc(i);
  }
  stage.addEventListener('load', () => {
    const doc = stage.contentDocument;
    if (!doc) return;
    doc.querySelectorAll('.rail .step').forEach((s, idx) => {
      s.style.cursor = 'pointer';
      s.addEventListener('click', () => show(idx));
    });
    doc.querySelectorAll('.footer .btn').forEach(b => {
      const t = (b.textContent || '').trim();
      if (/Back/i.test(t)) b.addEventListener('click', () => show(current - 1));
      else if (/^Next/i.test(t)) b.addEventListener('click', () => show(current + 1));
    });
  });
  show(0);
</script>
