name: Weekly Trello Sync

on:
  schedule:
    - cron: '0 9 * * 5'  # Every Friday at 9am UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  sync:
    name: Sync Trello Boards
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to commit and push CHANGELOG.md

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync admin board
        run: node scripts/adminBoardSync.js
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Sync user board
        run: node scripts/userBoardSync.js
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: weekly Trello sync log $(date +%Y-%m-%d)"
          git push
